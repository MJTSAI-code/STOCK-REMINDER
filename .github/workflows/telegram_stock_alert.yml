name: 美股數據更新與情報推送

on:
  schedule:
    - cron: '30 21 * * *'  # 台灣時間 05:30 觸發 (UTC 21:30) -> 全年不變
    - cron: '30 9 * * *'   # 台灣時間 17:30 觸發 (UTC 09:30) -> 全年不變
  workflow_dispatch:       # 保留手動秒發按鈕

permissions:
  contents: write         # 賦予寫入檔案並 push 回倉庫的權限

jobs:
  update-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 檢查程式碼
        uses: actions/checkout@v4

      - name: 依台灣時間進行時區校正（完美對抗冬夏令與 GitHub 塞車延遲）
        id: check_time
        run: |
          export TZ="Asia/Taipei"
          TW_HOUR=$(date +%H)
          echo "目前 GitHub 伺服器實際啟動時的台灣時間: ${TW_HOUR} 點"
          
          # 如果是手動觸發 (workflow_dispatch)，一律放行
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "手動強制發射，全面放行！"
            echo "should_run=true" >> $GITHUB_ENV
          else
            # 容許早上窗口 (05~08 點) 或 晚上窗口 (17~20 點) 的延遲啟動
            if [ "$TW_HOUR" = "05" ] || [ "$TW_HOUR" = "06" ] || [ "$TW_HOUR" = "07" ] || [ "$TW_HOUR" = "08" ] || \
               [ "$TW_HOUR" = "17" ] || [ "$TW_HOUR" = "18" ] || [ "$TW_HOUR" = "19" ] || [ "$TW_HOUR" = "20" ]; then
              echo "✅ 在標準發射時間窗口內，放行數據任務。"
              echo "should_run=true" >> $GITHUB_ENV
            else
              echo "❌ 檢測到非正常的發射時間窗口，安全攔截。"
              echo "should_run=false" >> $GITHUB_ENV
            fi
          fi

      - name: 設定 Node.js 環境
        if: env.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 抓取 Finnhub 美股數據並生成 JSON
        if: env.should_run == 'true'
        run: |
          echo "開始向 Finnhub 請求數據..."
          echo '{"updated_at":"","stocks":{}}' > stock_data.json
          
          cat << 'EOF' > fetch_data.js
          const fs = require('fs');
          const stocks = ['NOW', 'NVDA', 'LITE', 'ONDS', 'MRVL', 'GOOG'];
          const apiKey = process.env.FINNHUB_KEY;
          
          async function run() {
            // 統一格式化本地時間日期 (YYYY-MM-DD) 避免 UTC 時差導致 Finnhub 報錯
            const formatDate = (date) => {
              const offset = date.getTimezoneOffset();
              const localDate = new Date(date.getTime() - (offset*60*1000));
              return localDate.toISOString().split('T')[0];
            };

            let result = { updated_at: new Date().toISOString(), data: {} };
            for(let sym of stocks) {
              try {
                // 抓股價
                const qRes = await fetch(`https://finnhub.io/api/v1/quote?symbol=${sym}&token=${apiKey}`);
                const qData = await qRes.json();
                
                // 抓新聞 (校正後的在地日期)
                const today = new Date();
                const oneWeekAgo = new Date(today.getTime() - 7*24*60*60*1000);
                const from = formatDate(oneWeekAgo);
                const to = formatDate(today);
                
                const nRes = await fetch(`https://finnhub.io/api/v1/company-news?symbol=${sym}&from=${from}&to=${to}&token=${apiKey}`);
                const nData = await nRes.json();
                
                result.data[sym] = { quote: qData, news: Array.isArray(nData) ? nData : [] };
              } catch(e) { 
                console.error(`抓取 ${sym} 失敗:`, e); 
                result.data[sym] = { quote: {}, news: [] }; // 防禦性空值，避免整個寫入掛掉
              }
            }
            fs.writeFileSync('stock_data.json', JSON.stringify(result, null, 2));
          }
          run();
          EOF
          
          export FINNHUB_KEY="${{ secrets.FINNHUB_API_KEY }}"
          node fetch_data.js
          rm fetch_data.js

      - name: 自動將數據更新存檔至 GitHub Pages
        if: env.should_run == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add stock_data.json
          
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -m "🤖 自動更新美股數據庫 [skip ci]"
            git push
          else
            echo "數據無變動，跳過 Commit"
          fi

      - name: 發射 Telegram 推送
        if: env.should_run == 'true'
        run: |
          echo "數據庫更新成功，開始發射 Telegram 通知！"
          TEXT="🛡️ 美股情報室數據已更新！%0A🚀 開啟儀表板：https://mjtsai-code.github.io/STOCK_ALERT/"
          curl -sS --fail -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=${TEXT}" \
            -d "disable_web_page_preview=true"
