name: 美股精選情報室

on:
  schedule:
    # 📝 智慧時區防線：提前到台灣時間 05:00 與 17:00 喚醒
    - cron: '0 21 * * *'
    - cron: '0 9 * * *'
  workflow_dispatch:

# 🔐 最高權限防線：保證定時執行時也絕對讀得到 Token
permissions: write-all

jobs:
  send-push:
    runs-on: ubuntu-latest
    steps:
      - name: 檢查並鎖定台灣絕對時間
        run: |
          export TZ="Asia/Taipei"
          CURRENT_HOUR=$(date +%H)
          echo "當前台北時間的整點為: ${CURRENT_HOUR} 點"
          
          # 🕒 夏令時間防線：如果是 05 點或 17 點，代表夏令時間提早到了，先沉睡 60 分鐘再發送
          if [ "$CURRENT_HOUR" = "05" ] || [ "$CURRENT_HOUR" = "17" ]; then
            echo "偵測到目前為夏令時間，機器人開始沉睡 60 分鐘..."
            sleep 3600
          fi
          
          # 🎯 這裡才是正確位置！不管是手動還是定時，沉睡完後絕對會執行發送！
          TEXT="🛡️ 美股情報室數據已更新！%0A🚀 開啟儀表板：%0Ahttps://mjtsai-code.github.io/STOCK_ALERT/"
          
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage?chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&text=${TEXT}&disable_web_page_preview=true"
