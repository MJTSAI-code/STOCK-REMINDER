name: 美股精選情報室

on:
  schedule:
    # 📝 智慧時區防線：提前到台灣時間 05:00 與 17:00 喚醒
    - cron: '0 21 * * *'
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  send-push:
    runs-on: ubuntu-latest
    steps:
      - name: 檢查並鎖定台灣絕對時間
        run: |
          export TZ="Asia/Taipei"
          CURRENT_HOUR=$(date +%H)
          echo "當前台北時間的整點為: ${CURRENT_HOUR} 點"
          
          if [ "$CURRENT_HOUR" = "05" ] || [ "$CURRENT_HOUR" = "17" ]; then
            echo "偵測到目前為夏令時間，機器人開始沉睡 60 分鐘..."
            sleep 3600
          fi
          
          # 📝 中文說明（跟大腦說話的部分）
          CAPTION="🛡️ 【美股精選情報室】數據已更新完成！%0A👉 點擊通知即可直接開啟精美看盤儀表板。"
          
          # 🎯 核心升級：改用 sendPhoto 發送精美圖卡，網址裸露在最前面擴大點擊面積
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendPhoto" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "photo=https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?w=500" \
            -d "caption=https://mjtsai-code.github.io/STOCK_ALERT/%0A%0A${CAPTION}"
