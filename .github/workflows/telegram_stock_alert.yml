name: 美股精選情報室

on:
  schedule:
    - cron: '30 21 * * *'  # 台灣 05:30 (紐約夏令 17:30 / 冬令 16:30)
    - cron: '30 22 * * *'  # 台灣 06:30 (紐約夏令 18:30 / 冬令 17:30)
    - cron: '30 9 * * *'   # 台灣 17:30 (紐約夏令 05:30 / 冬令 04:30)
    - cron: '30 10 * * *'  # 台灣 18:30 (紐約夏令 06:30 / 冬令 05:30)
  workflow_dispatch:       # 手動秒發

permissions: write-all

jobs:
  send-push:
    runs-on: ubuntu-latest
    steps:
      - name: 依紐約收盤時間進行數學邏輯校正
        run: |
          export TZ="America/New_York"
          NY_HOUR=$(date +%H)
          echo "目前紐約時間: ${NY_HOUR} 點 (台灣時間: $(date -d '@'"$(date +%s)" -u +'%H:%M' --date='8 hours') )"

          # 🎯 核心防線：非紐約 05 或 17 點則安全攔截
          if [ "$NY_HOUR" != "05" ] && [ "$NY_HOUR" != "17" ]; then
            echo "非標準發射窗口（美東 05/17 點），安全攔截。"
            exit 0
          fi

          echo "時區檢驗通過，開始發射通知！"
          TEXT="🛡️ 美股情報室數據已更新！%0A🚀 開啟儀表板：https://mjtsai-code.github.io/STOCK_ALERT/"

          curl -sS --fail -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=${TEXT}" \
            -d "disable_web_page_preview=true"
