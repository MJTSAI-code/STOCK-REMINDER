name: 24H 雲端股票數據自動同步

on:
  push:
    branches: [ main, master ]  # 兼容 main 或 master 分支
  schedule:
    - cron: '*/30 * * * *'       # 每 30 分鐘自動執行一次

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    
    # ⚡ 關鍵修正：必須強制開啟寫入權限，否則 GitHub 會拒絕 Action 把 JSON 存回來！
    permissions:
      contents: write
      
    steps:
    - name: 複製專案代碼
      uses: actions/checkout@v4

    - name: 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安裝極速依賴套件
      run: |
        pip install yfinance pytz

    - name: 執行資料爬蟲
      run: python update_stocks.py

    - name: 將最新 stock_data.json 推送回 GitHub 倉庫
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add stock_data.json
        # ⚡ 防錯優化：確保有檔案變動才提交，避免噴錯卡住
        git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 雲端自動同步：更新即時股價與新聞" && git push)
