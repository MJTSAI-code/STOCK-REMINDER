<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>美股情報 PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a140f;
    --surface: #2b241d;
    --accent: #ffcc00;
    --up: #00ff88;
    --down: #ff4444;
    --text: #e8d5b8;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--bg); color:var(--text);
    font-family:'IBM Plex Mono', monospace;
    min-height:100vh; padding-bottom:40px;
    background: linear-gradient(#1a140f, #2b241d);
  }

  /* 復古大時鐘 */
  .flip-clock-container {
    font-family: 'Press Start 2P', monospace;
    font-size: 72px;
    font-weight: 700;
    color: #ffcc00;
    text-shadow: 0 0 20px #ffcc00;
    background: #111;
    padding: 12px 24px;
    border: 6px solid #3a342d;
    border-radius: 12px;
    display: inline-block;
    box-shadow: 0 10px 0 #000, inset 0 10px 20px rgba(0,0,0,0.8);
    letter-spacing: 6px;
  }

  .topbar {
    display:flex; align-items:center; justify-content:center;
    padding:20px; background:#1c1814; border-bottom:5px solid #3a342d;
    flex-direction:column; gap:12px;
  }
  .logo {
    font-family:'Press Start 2P', monospace;
    font-size:18px; color:#ffcc00; letter-spacing:3px;
  }

  .grid {
    display:grid; grid-template-columns:1fr; gap:16px;
    margin:20px; padding:0 16px;
  }
  @media(min-width:768px){.grid{grid-template-columns:repeat(2,1fr);}}
  @media(min-width:1100px){.grid{grid-template-columns:repeat(3,1fr);}}

  .card {
    background:var(--surface); border:4px solid #3a342d;
    border-radius:12px; padding:20px; position:relative;
    box-shadow:0 12px 0 #111;
    transition:transform 0.3s;
  }
  .card:hover { transform: translateY(-6px); }

  .phase-badge {
    position:absolute; top:16px; right:16px;
    background:#3a1f4d; color:#cc88ff;
    padding:6px 12px; border-radius:6px;
    font-size:12px; font-weight:700; display:flex; align-items:center; gap:6px;
    box-shadow:0 4px 0 #000;
  }
  .phase-badge::before { content:"🌙"; }

  .card-sym { font-size:24px; font-weight:700; margin-bottom:4px; }
  .card-name { font-size:11px; color:#888; margin-bottom:16px; }

  /* 翻頁價格 */
  .price-flip {
    font-family: 'Press Start 2P', monospace;
    font-size:32px; font-weight:700;
    color:#ffcc00;
    background:#111;
    padding:8px 16px;
    border:3px solid #555;
    border-radius:6px;
    display:inline-block;
    box-shadow:inset 0 6px 0 #000;
    min-width:160px;
    text-align:center;
  }

  .change {
    font-size:14px; margin-top:6px;
  }

  @keyframes flip {
    0% { transform: rotateX(0deg); }
    50% { transform: rotateX(90deg); }
    100% { transform: rotateX(0deg); }
  }
  .flipping { animation: flip 0.8s ease; }

  .notice {
    text-align:center; margin:30px 20px; font-size:10px; color:#666;
    font-family:'Press Start 2P', monospace;
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">美股情報 PRO</div>
  <div class="flip-clock-container" id="heroTime">07:15</div>
</div>

<div class="grid" id="grid"></div>

<div class="notice">
  📌 YAHOO FINANCE • 復古翻頁機械鬧鐘風格
</div>

<script>
const STOCKS = [
  {sym:'NOW', name:'ServiceNow', ex:'NYSE'},
  {sym:'NVDA',name:'Nvidia', ex:'NASDAQ'},
  {sym:'LITE',name:'Lumentum', ex:'NASDAQ'},
  {sym:'ONDS',name:'Ondas', ex:'NASDAQ'},
  {sym:'MRVL',name:'Marvell', ex:'NASDAQ'},
  {sym:'GOOG',name:'Google C', ex:'NASDAQ'}
];

function updateClock(){
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  document.getElementById('heroTime').textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
}
setInterval(updateClock, 1000);
updateClock();

function buildGrid(){
  document.getElementById('grid').innerHTML = STOCKS.map(s => `
    <div class="card" id="card-${s.sym}">
      <div class="phase-badge" id="badge-${s.sym}">🌙 盤後</div>
      <div class="card-sym">${s.sym}</div>
      <div class="card-name">${s.name}</div>
      
      <div style="margin:12px 0 8px;">
        <span style="font-size:13px;color:#888;">收盤</span>
        <span class="price-flip" id="reg-${s.sym}">$000.00</span>
      </div>
      
      <div>
        <span style="font-size:13px;color:#cc88ff;">🌙 盤後</span>
        <span class="price-flip" id="post-${s.sym}">$000.00</span>
        <div class="change" id="chg-${s.sym}"></div>
      </div>
    </div>
  `).join('');
}

function renderPrice(sym, q){
  if(!q) return;
  const regular = parseFloat(q.regular || q.c || 0);
  const post = parseFloat(q.post || regular);
  const prevClose = parseFloat(q.prev_close || regular);
  
  const regChange = regular - prevClose;
  const postChange = post - regular;
  const postPct = regular ? (postChange / regular * 100) : 0;

  // 翻頁動畫
  const regEl = document.getElementById(`reg-${sym}`);
  const postEl = document.getElementById(`post-${sym}`);
  const chgEl = document.getElementById(`chg-${sym}`);

  regEl.classList.add('flipping');
  postEl.classList.add('flipping');
  setTimeout(() => {
    regEl.classList.remove('flipping');
    postEl.classList.remove('flipping');
  }, 800);

  regEl.textContent = `$${regular.toFixed(2)}`;
  postEl.textContent = `$${post.toFixed(2)}`;

  const color = postChange >= 0 ? 'up' : 'down';
  chgEl.innerHTML = `
    <span style="color:${postChange>=0?'#00ff88':'#ff4444'}">
      ${postChange >= 0 ? '▲' : '▼'} ${postChange.toFixed(2)} (${postPct.toFixed(2)}%)
    </span>
  `;
}

async function loadData(){
  try {
    const res = await fetch('./stock_data.json?t=' + Date.now());
    const json = await res.json();
    STOCKS.forEach(s => {
      const data = json.data?.[s.sym];
      if(data) renderPrice(s.sym, data.quote);
    });
  } catch(e) { console.error(e); }
}

buildGrid();
loadData();
setInterval(loadData, 60000);
</script>
</body>
</html>
