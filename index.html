<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="盤前情報">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="manifest" href="./manifest.json">
<title>盤前情報</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f; --surface: #12121a; --border: #1e1e2e;
    --accent: #c8ff00; --accent2: #00d4ff; --text: #e8e8f0;
    --muted: #5a5a7a; --up: #39ff8a; --down: #ff4d6d; --discord: #5865F2;
  }
  
  html, body { overflow-x: hidden; width: 100%; min-height: 100%; margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  * { box-sizing: inherit; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', sans-serif; font-weight: 400; padding-bottom: 24px; max-width: 1200px; margin: 0 auto; position: relative; }
  
  header, .hero, .control-strip { padding: 16px 20px 0; display: flex; align-items: center; justify-content: space-between; width: 100%; }
  header { padding-top: 18px; }
  .logo { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase; }
  .clock, .hero-sub, .status-label, .card-price-chg, .card-news-item .news-time, .detail-news-meta { font-family: 'DM Mono', monospace; }
  .clock, .hero-sub { font-size: 11px; color: var(--muted); }
  .hero { padding-bottom: 10px; }
  .hero-time { font-family: 'DM Mono', monospace; font-size: 32px; font-weight: 500; line-height: 1; }
  .hero-time span { color: var(--accent); }
  .hero-sub { margin-top: 4px; }
  
  .control-strip { padding-bottom: 14px; }
  .status-chip { background: var(--surface); border: 1px solid var(--border); border-radius: 100px; padding: 6px 12px; display: flex; align-items: center; gap: 6px; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: blink 2s infinite; }
  .status-label { font-size: 10px; color: var(--accent); }
  .refresh-btn { background: rgba(0,212,255,0.1); border: 1px solid var(--accent2); border-radius: 100px; padding: 6px 14px; font-size: 11px; color: var(--accent2); cursor: pointer; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
  .refresh-btn:active, .discord-btn:active { transform: scale(0.95); }
  
  .grid { display: grid; grid-template-columns: 1fr; gap: 12px; padding: 0 16px 12px; width: 100%; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; cursor: pointer; transition: border-color 0.2s cubic-bezier(0.4, 0, 0.2, 1), grid-column 0.2s; min-height: 105px; display: flex; flex-direction: column; justify-content: space-between; width: 100%; overflow: hidden; -webkit-tap-highlight-color: transparent; }
  .card.expanded { border-color: var(--accent2); grid-column: 1 / -1; order: -1; cursor: default; }
  
  .card-top { display: flex; justify-content: space-between; align-items: center; width: 100%; }
  .card-sym-wrapper { display: flex; align-items: center; gap: 8px; }
  
  /* ⚡ 強制修正：確保股票代號使用 DM Mono 科技感粗體與亮藍色 */
  .card-sym { font-family: 'DM Mono', monospace !important; font-size: 22px !important; font-weight: 700 !important; color: var(--accent2) !important; letter-spacing: 0.02em; line-height: 1.1; }
  
  .market-badge { font-family: 'Noto Sans TC', sans-serif; font-size: 9px; font-weight: 700; color: var(--accent); border: 1px solid var(--accent); padding: 2px 6px; border-radius: 4px; background: rgba(200, 255, 0, 0.08); letter-spacing: 0.05em; display: none; text-shadow: 0 0 4px rgba(200, 255, 0, 0.2); }
  
  .card-name { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .card-price { text-align: right; }
  .card-price-num { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 700; }
  .card-price-chg { font-size: 11px; margin-top: 2px; }
  .up { color: var(--up) !important; } .down { color: var(--down) !important; } .neutral { color: var(--muted); }
  
  .card-news { border-top: 1px solid var(--border); padding-top: 8px; margin-top: 8px; width: 100%; pointer-events: none; }
  .card.expanded .card-news { display: none; }
  .card-news-item { font-size: 11px; color: var(--text); line-height: 1.6; padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.04); text-overflow: ellipsis; overflow: hidden; white-space: nowrap; width: 100%; }
  .card-news-item .news-time { font-size: 9px; color: var(--muted); margin-top: 1px; }
  .card-news-item:last-child { border-bottom: none; }
  
  .card-detail { display: none; margin-top: 12px; border-top: 1px solid var(--border); padding-top: 12px; width: 100%; }
  .card.expanded .card-detail { display: block; }
  
  .chart-box { border-radius: 10px; overflow: hidden; border: 1px solid var(--border); height: 320px; margin-bottom: 14px; width: 100%; background: var(--bg); transform: translateZ(0); }
  .chart-box iframe { width: 100%; height: 100%; border: none; }
  
  .detail-news-item { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 8px; text-decoration: none; display: block; width: 100%; transition: border-color 0.2s ease, background-color 0.2s ease, box-shadow 0.2s ease; -webkit-tap-highlight-color: transparent; }
  .detail-news-title { font-size: 12px; color: var(--text); line-height: 1.5; }
  .detail-news-meta { margin-top: 4px; display: block; font-size: 9px; color: var(--muted); }
  
  .detail-news-item:hover, .detail-news-item:active { border-color: var(--accent) !important; background: rgba(200, 255, 0, 0.04); box-shadow: 0 0 10px rgba(200, 255, 0, 0.12); }
  
  .discord-box { margin: 12px 16px; padding: 16px; background: rgba(88,101,242,0.03); border: 1px solid rgba(88,101,242,0.15); border-radius: 16px; display: flex; flex-direction: column; gap: 10px; }
  .discord-title { font-size: 12px; font-weight: 500; color: #5865F2; display: flex; align-items: center; gap: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
  .discord-text { font-size: 11px; color: var(--muted); line-height: 1.8; word-break: keep-all; white-space: normal; }
  @media (max-width: 380px) { .discord-text { font-size: 10px; } }
  .time-group { white-space: nowrap; display: inline-block; vertical-align: middle; }
  .discord-highlight { color: var(--accent); border: 1px solid var(--accent); border-radius: 100px; padding: 1px 6px; font-size: 10px; font-weight: 500; display: inline-block; background: rgba(200, 255, 0, 0.05); margin: 0 1px; line-height: 1.2; vertical-align: middle; }
  
  .discord-btn-group { display: flex; flex-direction: column; gap: 8px; width: 100%; }
  .discord-btn { width: 100%; padding: 12px; background: var(--discord); color: #fff; border: none; border-radius: 12px; font-family: 'Noto Sans TC', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; transition: all 0.2s; }
  .discord-btn-join { background: transparent; border: 1.5px solid var(--discord); color: #fff; }
  .discord-btn-join:active { background: rgba(88,101,242,0.15); }
  
  .notice { margin: 0 16px; padding: 10px 12px; background: rgba(0, 212, 255, 0.05); border: 1px solid rgba(0, 212, 255, 0.2); border-radius: 10px; font-size: 10px; color: var(--accent2); line-height: 1.7; }
  .loading-dot { display: inline-block; animation: blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:0.2} 50%{opacity:1} }

  @media (min-width: 600px) {
    .hero-time { font-size: 48px; }
    .grid { grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 20px 20px; }
    .discord-box, .notice { margin: 0 20px 12px; }
    .discord-btn-group { flex-direction: row; }
    .discord-btn { flex: 1; }
    .chart-box { height: 420px; }
  }
  @media (min-width: 1024px) {
    .grid { grid-template-columns: repeat(3, 1fr); }
  }

  @media (min-width: 1200px) {
    html, body { height: 100vh; max-height: 100vh; overflow: hidden; }
    html:has(.card.expanded), body:has(.card.expanded) { height: auto !important; max-height: none !important; overflow-y: auto !important; }
    body { max-width: 1400px; display: flex; flex-direction: column; justify-content: space-between; padding-bottom: 15px; }
    body:has(.card.expanded) { justify-content: flex-start; gap: 10px; }
    .grid { gap: 16px; padding-bottom: 5px; }
    .discord-box { margin: 6px 16px; padding: 14px; }
    .notice { margin: 0 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">盤前情報 · PRO</div>
  <div class="clock" id="clock">--:--:--</div>
</header>

<div class="hero">
  <div>
    <div class="hero-time" id="heroTime">--<span>:</span>--</div>
    <div class="hero-sub" id="heroDate">載入中...</div>
  </div>
</div>

<div class="control-strip">
  <div class="status-chip">
    <div class="status-dot"></div>
    <div class="status-label" id="update-status">初始化數據中</div>
  </div>
  <div class="refresh-btn" onclick="manualRefresh()">🔄 重新載入</div>
</div>

<div class="grid" id="grid"></div>

<div class="discord-box">
  <div class="discord-title"><span>🛡️</span> 24H 雲端自動推送已部署</div>
  <div class="discord-text">
    無須開啟網頁，GitHub 雲端將於每日美股盤後 <span class="time-group"><span class="discord-highlight">05:30 / 06:30</span> 與晚間 <span class="discord-highlight">17:30 / 18:30</span></span> 自動精準推送至 Telegram
  </div>
  <div class="discord-btn-group">
    <a class="discord-btn" href="https://discord.gg/vzVbybVvys" target="_blank">📱 進入我的美股精選情報室</a>
    <a class="discord-btn discord-btn-join" href="https://discord.gg/vzVbybVvys" target="_blank">⚡ 訂閱我的美股推送播報</a>
  </div>
</div>

<div class="notice">
  📌 提示：網頁已啟用 PWA 離線技術，數據源已安全移至 GitHub Actions 雲端私密維護。
</div>

<script>
const STOCKS = [
  { sym: 'NOW',  name: 'ServiceNow',   ex: 'NYSE' },
  { sym: 'NVDA', name: 'Nvidia',       ex: 'NASDAQ' },
  { sym: 'LITE', name: 'Lumentum',     ex: 'NASDAQ' },
  { sym: 'ONDS', name: 'Ondas 無人機', ex: 'NASDAQ' },
  { sym: 'MRVL', name: 'Marvell',      ex: 'NASDAQ' },
  { sym: 'GOOG', name: 'Google C',     ex: 'NASDAQ' },
];

// ⚡ 防禦性本地假數據：避免 JSON 還沒生成時畫面爆掉
const FALLBACK_DATA = {
  "NOW":  { "quote": { "c": 750.45, "d": 12.30, "dp": 1.66 }, "news": [{ "headline": "ServiceNow 雲端運算需求大增，機構調高評等", "source": "Bloomberg", "datetime": Date.now()/1000 }] },
  "NVDA": { "quote": { "c": 875.12, "d": 24.50, "dp": 2.88 }, "news": [{ "headline": "Nvidia Blackwell 晶片出貨超預期，AI 需求續強", "source": "Reuters", "datetime": Date.now()/1000 }] },
  "LITE": { "quote": { "c": 52.30,  "d": -1.20, "dp": -2.24 }, "news": [{ "headline": "Lumentum 供應鏈調整，短期毛利面臨挑戰", "source": "MarketWatch", "datetime": Date.now()/1000 }] },
  "ONDS": { "quote": { "c": 3.15,   "d": 0.45,  "dp": 16.67 }, "news": [{ "headline": "Ondas 斬獲美國軍方無人機全新採購訂單", "source": "DefenseNews", "datetime": Date.now()/1000 }] },
  "MRVL": { "quote": { "c": 68.40,  "d": 1.15,  "dp": 1.71 }, "news": [{ "headline": "Marvell 發表全新資料中心光通訊晶片", "source": "TechNews", "datetime": Date.now()/1000 }] },
  "GOOG": { "quote": { "c": 175.20, "d": -0.80, "dp": -0.45 }, "news": [{ "headline": "Google 搜尋引擎導入全新 Gemini 核心演算法", "source": "CNBC", "datetime": Date.now()/1000 }] }
};

let expandedSym = null;
let globalDataCache = null;

function updateClock() {
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  document.getElementById('clock').textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  document.getElementById('heroTime').innerHTML = `${pad(now.getHours())}<span>:</span>${pad(now.getMinutes())}`;
  document.getElementById('heroDate').textContent = `${now.getFullYear()}.${pad(now.getMonth()+1)}}.${pad(now.getDate())} 週${['日','一','二','三','四','五','六'][now.getDay()]}`;
}
setInterval(updateClock, 1000); 
updateClock();

function buildGrid() {
  document.getElementById('grid').innerHTML = STOCKS.map(s => `
    <div class="card" id="card-${s.sym}" onclick="toggleCard('${s.sym}','${s.ex}', event)">
      <div class="card-top">
        <div>
          <div class="card-sym-wrapper">
            <div class="card-sym">${s.sym}</div>
            <div class="market-badge" id="badge-${s.sym}">盤前</div>
          </div>
          <div class="card-name">${s.name}</div>
        </div>
        <div class="card-price">
          <div class="card-price-num neutral" id="price-${s.sym}">$...</div>
          <div class="card-price-chg neutral" id="chg-${s.sym}">--</div>
        </div>
      </div>
      <div class="card-news" id="news-${s.sym}"><div class="card-news-item">載入中...</div></div>
      <div class="card-detail" id="detail-${s.sym}">
        <div class="chart-box"><iframe id="chart-${s.sym}" src="" allowtransparency="true"></iframe></div>
        <div class="detail-news" id="detail-news-${s.sym}"></div>
      </div>
    </div>
  `).join('');
}

function toggleCard(sym, ex, event) {
  if (expandedSym === sym && event.target.closest('.detail-news-item')) return;
  const card = document.getElementById(`card-${sym}`);
  if (!card) return;
  const isExp = card.classList.contains('expanded');
  
  if (expandedSym && expandedSym !== sym) {
    const prevCard = document.getElementById(`card-${expandedSym}`);
    if (prevCard) {
      prevCard.classList.remove('expanded');
      const prevIframe = document.getElementById(`chart-${expandedSym}`);
      if (prevIframe) prevIframe.src = '';
    }
  }

  if (!isExp) {
    card.classList.add('expanded');
    expandedSym = sym;
    window.location.hash = "expanded";
    setTimeout(() => { window.scrollTo({ top: card.offsetTop - 15, behavior: 'smooth' }); }, 60);

    const iframe = document.getElementById(`chart-${sym}`);
    if (iframe) {
      iframe.src = `https://www.tradingview.com/widgetembed/?symbol=${ex}:${sym}&interval=D&hidesidetoolbar=1&theme=dark&style=1&timezone=Asia/Taipei&locale=zh_TW`;
    }
    const cacheSource = globalDataCache?.[sym] ? globalDataCache : FALLBACK_DATA;
    renderDetailNews(sym, cacheSource[sym].news);
  } else {
    card.classList.remove('expanded');
    expandedSym = null;
    const iframe = document.getElementById(`chart-${sym}`);
    if (iframe) iframe.src = '';
    if (window.location.hash === "#expanded") history.replaceState(null, null, ' ');
  }
}

function renderDetailNews(sym, items) {
  const box = document.getElementById('detail-news-' + sym);
  if (!box || !items) return;
  box.innerHTML = items.slice(0, 3).map(item => {
    const d = new Date((item.datetime ?? Date.now() / 1000) * 1000);
    return `<a class="detail-news-item" href="${item.url ?? '#'}" target="_blank" rel="noopener noreferrer">
      <div class="detail-news-title">${item.headline ?? '未命名新聞情報'}</div>
      <span class="detail-news-meta">${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')} · ${item.source ?? '未知來源'}</span>
    </a>`;
  }).join('');
}

// 渲染核心數據的封裝函式
function renderStockDOM(dataSource, phaseLabel) {
  STOCKS.forEach(s => {
    const sData = dataSource[s.sym];
    if (!sData) return;
    
    const d = sData.quote;
    const priceEl = document.getElementById(`price-${s.sym}`);
    const chgEl = document.getElementById(`chg-${s.sym}`);
    const badgeEl = document.getElementById(`badge-${s.sym}`);
    
    if (d && d.c !== undefined && priceEl && chgEl) {
      const cls = d.d >= 0 ? 'up' : 'down';
      const sign = d.d >= 0 ? '+' : '';
      
      priceEl.textContent = `$${d.c.toFixed(2)}`;
      priceEl.className = `card-price-num ${cls}`;
      chgEl.textContent = `${sign}${d.d.toFixed(2)} (${sign}${d.dp.toFixed(2)}%)`;
      chgEl.className = `card-price-chg ${cls}`;
      
      if (badgeEl) {
        if (phaseLabel) {
          badgeEl.textContent = phaseLabel;
          badgeEl.style.display = "inline-block";
        } else {
          badgeEl.style.display = "none";
        }
      }
    }
    
    const items = sData.news;
    const newsBox = document.getElementById(`news-${s.sym}`);
    if (newsBox) {
      if (items && items.length > 0) {
        newsBox.innerHTML = items.slice(0, 2).map(item => `
          <div class="card-news-item">
            • ${item.headline ?? ''}
            <div class="news-time">${new Date((item.datetime ?? Date.now()/1000)*1000).getMonth()+1}/${new Date((item.datetime ?? Date.now()/1000)*1000).getDate()} · ${item.source ?? ''}</div>
          </div>
        `).join('');
      } else {
        newsBox.innerHTML = '<div class="card-news-item">暫無新聞</div>';
      }
    }
  });
}

async function loadCloudData() {
  const statusEl = document.getElementById('update-status');
  try {
    const res = await fetch(`./stock_data.json?t=${Date.now()}`);
    const json = await res.json();
    globalDataCache = json?.data ?? {};
    
    const dataTime = json?.updated_at ? new Date(json.updated_at) : new Date();
    const nyTimeStr = dataTime.toLocaleTimeString('en-US', { timeZone: 'America/New_York', hour12: false });
    const [nyHour, nyMin] = nyTimeStr.split(':').map(Number);
    const totalNyMinutes = nyHour * 60 + nyMin;
    
    let phaseLabel = ""; 
    if (totalNyMinutes >= 240 && totalNyMinutes < 570) phaseLabel = "盤前";
    else if (totalNyMinutes >= 960 && totalNyMinutes < 1200) phaseLabel = "盤後";

    renderStockDOM(globalDataCache, phaseLabel);
    
    if (statusEl) {
      const updateTime = new Date(json?.updated_at ?? Date.now());
      statusEl.textContent = `雲端同步完畢 (${String(updateTime.getHours()).padStart(2,'0')}:${String(updateTime.getMinutes()).padStart(2,'0')}更新)`;
    }
  } catch(e) {
    console.warn("未偵測到 stock_data.json，啟動本地防禦性高質感模擬數據。");
    // ⚡ 核心修正：撈不到 JSON 時，立刻用精緻模擬數據補上，維持畫面美觀與字體
    renderStockDOM(FALLBACK_DATA, "盤前展示");
    if (statusEl) statusEl.textContent = "展示模式 (待同步雲端)";
  }
}

function manualRefresh() { loadCloudData(); }
buildGrid(); 
loadCloudData();
</script>
</body>
</html>
